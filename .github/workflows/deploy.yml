name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on server
        run: |
          curl -s -X POST \
            "${{ secrets.CPANEL_GIT_PULL_URL }}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            --max-time 60 || true

      - name: Wait for pull to complete
        run: sleep 10

      - name: Run deploy commands
        run: |
          HTTP_CODE=$(curl -s -o /tmp/deploy.out -w "%{http_code}" -X POST \
            "https://citora.com.co/webhook/deploy" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 300)
          echo "HTTP $HTTP_CODE"
          echo "--- response ---"
          cat /tmp/deploy.out || true
          echo ""
          echo "----------------"
          # Treat timeouts as success because migrations/cache warming may
          # still be finishing on the server; anything else should fail.
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "000" ]; then
            exit 0
          else
            exit 1
          fi
