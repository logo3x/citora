<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Citora</title>

  <!-- Anillas del calendario -->
  <rect x="18" y="6" width="3" height="8" rx="1.5" fill="#1A2A47"/>
  <rect x="30.5" y="6" width="3" height="8" rx="1.5" fill="#1A2A47"/>
  <rect x="43" y="6" width="3" height="8" rx="1.5" fill="#1A2A47"/>

  <!-- Cuerpo del calendario -->
  <rect x="10" y="10" width="44" height="34" rx="5"
        fill="#FFFFFF" stroke="#1A2A47" stroke-width="3.5"/>

  <!-- Cuadrículas internas -->
  <rect x="16" y="22" width="6" height="6" rx="1" fill="#E8843A"/>
  <rect x="16" y="30" width="6" height="6" rx="1" fill="#2DB5A8"/>
  <rect x="24" y="30" width="6" height="6" rx="1" fill="#2E5D8A"/>

  <!-- Reloj -->
  <circle cx="42" cy="36" r="14" fill="#FFFFFF" stroke="#1A2A47" stroke-width="3.5"/>
  <line x1="42" y1="36" x2="42" y2="29"
        stroke="#1A2A47" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="42" y1="36" x2="49" y2="36"
        stroke="#1A2A47" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Insignia de check -->
  <circle cx="50" cy="22" r="9" fill="#2DB5A8"/>
  <polyline points="46,22 49,25 54,19"
            fill="none" stroke="#FFFFFF" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
